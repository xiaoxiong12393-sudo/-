name: Build Tweak
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-13
    steps:
    - uses: actions/checkout@v4

    # 1. 浅层克隆 Theos 核心
    - name: Clone Theos
      run: |
        git clone --depth=1 --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    # 2. 直接把 Mac 系统自带的官方最新 iOS SDK 软链接到 Theos 目录中，0秒搞定，永不失效！
    - name: Link System iOS SDK
      run: |
        mkdir -p ~/theos/sdks
        SYS_SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        ln -s "$SYS_SDK_PATH" ~/theos/sdks/iPhoneOS.sdk
        echo "系统自带 SDK 路径: $SYS_SDK_PATH"

    # 3. 开始执行编译打包
    - name: Build Package
      run: |
        export THEOS=~/theos
        export THEOS_PACKAGE_SCHEME=rootless
        make package SYSROOT=~/theos/sdks/iPhoneOS.sdk
        
    # 4. 上传打包好的 .deb 文件
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScreenshotIsland-DEB
        path: packages/*.deb
