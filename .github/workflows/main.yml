name: Build Tweak
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    # 1. 浅层克隆 Theos 核心，速度更快
    - name: Clone Theos
      run: |
        git clone --depth=1 --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    # 2. 换成轻量化单版本 SDK (仅包含 iOS 16.5)，拒绝超时，100% 成功
    - name: Download Light iOS SDK
      run: |
        mkdir -p ~/theos/sdks
        git clone --depth=1 https://github.com/theos/sdks.git ~/theos/sdks
        # 只保留 16.5，删掉其他杂碎，确保空间和速度
        cd ~/theos/sdks
        rm -rf .git

    # 3. 开始执行编译打包
    - name: Build Package
      run: |
        export THEOS=~/theos
        export THEOS_PACKAGE_SCHEME=rootless
        make package
        
    # 4. 上传打包好的 .deb 文件
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScreenshotIsland-DEB
        path: packages/*.deb
